services:
  # Build the frontend first, then exit
  frontend-builder:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app:delegated
      - frontend_build:/app/build
      - frontend_node_modules:/app/node_modules
    environment:
      - REACT_APP_API_URL=https://fec-roadmap.precis.tu-darmstadt.de/api
    command: >
      sh -c "
      npm install &&
      npm run build
      "

  backend:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./backend:/app
      - frontend_build:/frontend-build
    command: >
      sh -c "
      pip install -r requirements.txt &&
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "
    depends_on:
      frontend-builder:
        condition: service_completed_successfully
    networks:
      - internal-web
      - tpse31-internal
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal-web"
      - "traefik.http.services.tpse31-fec-backend.loadbalancer.server.port=8000"
      # All routes go to Django - it serves both API and frontend
      - "traefik.http.routers.tpse31-fec.rule=Host(`fec-roadmap.precis.tu-darmstadt.de`)"
      - "traefik.http.routers.tpse31-fec.entrypoints=websecure"
      - "traefik.http.routers.tpse31-fec.service=tpse31-fec-backend"
      - "traefik.http.routers.tpse31-fec.tls=true"
    restart: unless-stopped

networks:
  internal-web:
    external: true
    name: internal-web
  tpse31-internal:
    driver: bridge
volumes:
  frontend_node_modules:
  frontend_build:
